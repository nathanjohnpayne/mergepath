name: repo-lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: make_ci_scripts_executable
        run: chmod +x scripts/ci/*

      - name: check_required_root_files
        run: ./scripts/ci/check_required_root_files

      - name: check_no_tool_folder_instructions
        run: ./scripts/ci/check_no_tool_folder_instructions

      - name: check_no_forbidden_top_level_dirs
        run: ./scripts/ci/check_no_forbidden_top_level_dirs

      - name: check_dist_not_modified
        run: ./scripts/ci/check_dist_not_modified

      - name: check_spec_test_alignment
        run: ./scripts/ci/check_spec_test_alignment

      - name: check_duplicate_docs
        run: ./scripts/ci/check_duplicate_docs
